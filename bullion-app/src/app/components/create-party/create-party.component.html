<!-- src/app/components/create-party/create-party.component.html -->
<form #partyForm="ngForm" (ngSubmit)="onSubmit(partyForm)">
  <mat-form-field>
    <input matInput placeholder="Name" [(ngModel)]="party.name" name="name" required>
  </mat-form-field>
  <button mat-raised-button color="primary" type="submit">Create Party</button>
</form>
